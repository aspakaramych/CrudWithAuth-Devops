name: CI-CD

on: 
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish application
        run: |
          dotnet restore CrudWithAuth/CrudWithAuth.csproj
          dotnet publish CrudWithAuth/CrudWithAuth.csproj -c Release -o ./out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./out/
          retention-days: 1

  deploy:
    needs: ["publish"]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./ansible/out  

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          # Переходим в папку ansible и запускаем оттуда
          cd ansible
          ansible-playbook -i "localhost," -c local deploy.yml
