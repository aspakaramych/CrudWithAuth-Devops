name: CI-CD

on: 
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  publish:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Publish application
        run: |
          dotnet clean CrudWithAuth/CrudWithAuth.csproj
          dotnet restore CrudWithAuth/CrudWithAuth.csproj
          dotnet publish CrudWithAuth/CrudWithAuth.csproj -c Release -o ./out --no-restore
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./out/
          retention-days: 1

  deploy:
    needs: ["publish"]
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./out 

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          # Запускаем исправленный плейбук
          ansible-playbook -i "localhost," -c local deploy.yml
