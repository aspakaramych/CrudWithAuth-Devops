- name: Ensure app directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    mode: '0755'

- name: Copy application source code
  copy:
    src: "{{ playbook_dir }}/../CrudWithAuth/"
    dest: "{{ app_dir }}/src/"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Build and publish application
  shell: |
    cd {{ app_dir }}/src
    dotnet publish CrudWithAuth.csproj -c Release -o {{ app_dir }}/publish
  environment:
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  changed_when: true

- name: Render appsettings.json
  template:
    src: templates/appsettings.json.j2
    dest: "{{ app_dir }}/publish/appsettings.json"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'

- name: Deploy systemd unit
  template:
    src: templates/dotnet.service.j2
    dest: /etc/systemd/system/crudwithauth.service
  notify: Restart Application

- name: Create log directory
  file:
    path: /var/log/crudwithauth
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Wait for PostgreSQL to be ready
  wait_for:
    host: 127.0.0.1
    port: 5432
    delay: 5
    timeout: 60
    state: started

- name: Wait for Redis to be ready
  wait_for:
    host: 127.0.0.1
    port: 7000
    delay: 5
    timeout: 30
    state: started

- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Deploy Nginx configuration
  template:
    src: templates/nginx_app.j2
    dest: /etc/nginx/sites-available/crudwithauth
  notify: Reload Nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/crudwithauth
    dest: /etc/nginx/sites-enabled/crudwithauth
    state: link

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx