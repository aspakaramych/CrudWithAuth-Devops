- name: Configure PostgreSQL Database
  block:
    - name: Create database
      postgresql_db:
        name: "{{ db_name }}"
    - name: Create user
      postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        db: "{{ db_name }}"
        priv: "ALL"
  become_user: postgres          
    
- name: Ensure backup directory exists
  file:
        path: /var/backups/postgres
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

- name: Deploy DB backup script
  template:
      src: templates/db_backup.sh.j2
      dest: /usr/local/bin/db_backup.sh
      owner: root
      group: root
      mode: '0755'

- name: Schedule PostgreSQL backup (every day at 3 AM)
  ansible.builtin.cron:
      name: "Daily postgres backup"
      hour: "3"
      minute: "0"
      job: "/usr/local/bin/db_backup.sh >> /var/log/db_backup.log 2>&1"