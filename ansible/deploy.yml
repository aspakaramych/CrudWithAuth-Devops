- name: Deploy .Net
  hosts: all
  become: yes

  vars:
    app_dir: "/var/www/crudwithauth"
    app_user: "www-data"
    db_name: "crud_db"
    db_user: "postgres"
    db_password: "postgres_password"
    redis_ports: [7000, 7001, 7002, 7003, 7004, 7005]

  tasks:
    - name: Check if .NET 9 is already installed
      command: dotnet --version
      register: dotnet_check
      ignore_errors: yes
      changed_when: false

    - name: Configure Microsoft Repository
      block:
        - name: Cleanup Microsoft Repo Conflicts
          shell: |
            rm -f /etc/apt/sources.list.d/microsoft-prod.list
            rm -f /usr/share/keyrings/microsoft-prod.gpg
          ignore_errors: yes

        - name: Add Microsoft Repository
          apt:
            deb: "https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version }}/packages-microsoft-prod.deb"
          register: apt_res
          until: apt_res is success
          retries: 5
          delay: 5

        - name: Update apt cache
          apt:
            update_cache: yes
      when: dotnet_check.failed

    - name: Install .NET 9.0 SDK and Runtime
      apt: 
        name: 
          - dotnet-sdk-9.0
          - aspnetcore-runtime-9.0
        state: present
      register: apt_dotnet_install
      until: apt_dotnet_install is success
      retries: 5
      delay: 5
      when: dotnet_check.failed

    - name: Install System Packages
      apt: 
        name: [postgresql, postgresql-contrib, redis-server, python3-psycopg2, acl, curl]
        state: present
      register: apt_sys_install
      until: apt_sys_install is success
      retries: 5

    - name: Configure PostgreSQL Database
      become_user: postgres
      block:
        - postgresql_db:
            name: "{{ db_name }}"
        - postgresql_user:
            name: "{{ db_user }}"
            password: "{{ db_password }}"
            priv: "ALL"

    - name: Ensure Redis directories exist
      file:
        path: "/var/lib/redis/{{ item }}"
        state: directory
        owner: redis
        group: redis
      loop: "{{ redis_ports }}"

    - name: Configure Redis Nodes
      template:
        src: templates/redis.conf.j2
        dest: "/etc/redis/redis_{{ item }}.conf"
      loop: "{{ redis_ports }}"
    
    - name: Start Redis instances
      shell: "redis-server /etc/redis/redis_{{ item }}.conf &"
      loop: "{{ redis_ports }}"
      changed_when: false

    - name: Check if Redis Cluster already exists
      command: redis-cli -p 7000 cluster info
      register: redis_cluster_status
      ignore_errors: yes
      changed_when: false

    - name: Create Redis Cluster
      shell: >
        redis-cli --cluster create
        {% for p in redis_ports %} 127.0.0.1:{{ p }} {% endfor %}
        --cluster-replicas 1 --cluster-yes
      when: "'cluster_state:ok' not in redis_cluster_status.stdout"

    - name: Ensure app directory exists
      file: 
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app artifacts to web folder
      copy:
        src: "./out/" 
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        mode: '0644'
    
    - name: Render appsettings.json
      template: 
        src: templates/appsettings.json.j2
        dest: "{{ app_dir }}/appsettings.json"
        owner: "{{ app_user }}"
        mode: '0600'
    
    - name: Deploy systemd unit
      template:
        src: templates/dotnet.service.j2
        dest: /etc/systemd/system/crudwithauth.service
      notify: Restart Application
  
  handlers:
    - name: Restart Application
      systemd:
        name: crudwithauth
        state: restarted
        enabled: yes
        daemon_reload: yes