- name: Deploy .Net
  hosts: all
  become: yes

  vars:
    app_dir: "/var/www/crudwithauth"
    app_user: "www-data"
    dotnet_path: "/usr/bin/dotnet"
    db_name: "crud_db"
    db_user: "postgres"
    db_password: "postgres_password"
    redis_ports: [7000, 7001, 7002, 7003, 7004, 7005]

  tasks:

    - name: Download Microsoft GPG key
      get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /etc/apt/keyrings/microsoft.asc
        mode: '0644'

    - name: Add Microsoft Repository to sources list
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.asc] https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/prod {{ ansible_distribution_release }} main"
        state: present
        filename: microsoft-prod

    - name: Update apt cache after adding repo
      apt:
        update_cache: yes

    - name: Install .NET 9.0 SDK
      apt:
        name: 
          - dotnet-sdk-9.0
          - aspnetcore-runtime-9.0
        state: present
      register: dotnet_install
      ignore_errors: yes


    - name: Install .NET 9 via script if apt fails
      shell: |
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir /usr/share/dotnet
        ln -s /usr/share/dotnet/dotnet /usr/bin/dotnet
      when: dotnet_install is failed

    - name: Install System Packages
      apt: 
        name: [postgresql, postgresql-contrib, redis-server, python3-psycopg2, acl, curl]
        state: present

    - name: Configure PostgreSQL Database
      become_user: postgres
      block:
        - postgresql_db:
            name: "{{ db_name }}"
        - postgresql_user:
            name: "{{ db_user }}"
            password: "{{ db_password }}"
            priv: "ALL"

    - name: Ensure Redis directories exist
      file:
        path: "/var/lib/redis/{{ item }}"
        state: directory
        owner: redis
        group: redis
      loop: "{{ redis_ports }}"

    - name: Configure Redis Nodes
      template:
        src: templates/redis.conf.j2
        dest: "/etc/redis/redis_{{ item }}.conf"
      loop: "{{ redis_ports }}"
      vars:
        port: "{{ item }}"
    
    - name: Start Redis instances
      shell: "redis-server /etc/redis/redis_{{ item }}.conf"
      loop: "{{ redis_ports }}"
      changed_when: false

    - name: Create Redis Cluster
      shell: >
        redis-cli --cluster create
        {% for p in redis_ports %} 127.0.0.1:{{ p }} {% endfor %}
        --cluster-replicas 1 --cluster-yes
      register: cluster_init
      failed_when: false
      changed_when: "'OK' in cluster_init.stdout"

    - name: Ensure app directory exists
      file: 
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app artifacts to web folder
      copy:
        src: "./out/" 
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        mode: '0644'
    
    - name: Render appsettings.json
      template: 
        src: templates/appsettings.json.j2
        dest: "{{ app_dir }}/appsettings.json"
        owner: "{{ app_user }}"
        mode: '0600'
    
    - name: Deploy systemd unit
      template:
        src: templates/dotnet.service.j2
        dest: /etc/systemd/system/crudwithauth.service
      notify: Restart Application
  
  handlers:
    - name: Restart Application
      systemd:
        name: crudwithauth
        state: restarted
        enabled: yes
        daemon_reload: yes