- name: Deploy .Net
  hosts: all
  become: yes

  vars:
    app_dir: "/var/www/crudwithauth"
    app_user: "www-data"
    db_name: "crud_db"
    db_user: "postgres"
    db_password: "postgres_password"
    redis_ports: [7000, 7001, 7002, 7003, 7004, 7005]
    jwt_secret_key: H81NOnU9S+BLv1YMn3KIZ1w1g9MgfDI4D8l6QiJbJsA=
    dotnet_path: "/usr/bin/dotnet"

  tasks:
    - name: Check if .NET is already installed
      command: dotnet --version
      register: dotnet_check
      ignore_errors: yes
      changed_when: false

    - name: Install .NET 9 via Official Script (Reliable Method)
      shell: |
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir /usr/share/dotnet
        ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
      when: dotnet_check.failed
      args:
        creates: /usr/bin/dotnet

    - name: Install System Packages
      apt: 
        name: [postgresql, postgresql-contrib, redis-server, python3-psycopg2, acl, curl]
        state: present
        update_cache: yes
      register: apt_res
      until: apt_res is success
      retries: 5
      delay: 5
    
    - name: Install rclone
      apt:
        name: rclone
        state: present
        
    - name: Configure PostgreSQL Database
      become_user: postgres
      block:
        - postgresql_db:
            name: "{{ db_name }}"
        - postgresql_user:
            name: "{{ db_user }}"
            password: "{{ db_password }}"
            db: "{{ db_name }}"  
            priv: "ALL"          
    
    - name: Ensure backup directory exists
      file:
        path: /var/backups/postgres
        state: directory
        owner: postgres
        group: postgres
        mode: '0700'

    - name: Deploy DB backup script
      template:
        src: templates/db_backup.sh.j2
        dest: /usr/local/bin/db_backup.sh
        owner: root
        group: root
        mode: '0755'

    - name: Schedule PostgreSQL backup (every day at 3 AM)
      ansible.builtin.cron:
        name: "Daily postgres backup"
        hour: "3"
        minute: "0"
        job: "/usr/local/bin/db_backup.sh >> /var/log/db_backup.log 2>&1"

    - name: Ensure Redis directories exist
      file:
        path: "/var/lib/redis/{{ item }}"
        state: directory
        owner: redis
        group: redis
      loop: "{{ redis_ports }}"
      vars:
        port: "{{ item }}"

    - name: Configure Redis Nodes
      template:
        src: templates/redis.conf.j2
        dest: "/etc/redis/redis_{{ item }}.conf"
      loop: "{{ redis_ports }}"
      vars:
        port: "{{ item }}"
    
    - name: Start Redis instances
      shell: "redis-server /etc/redis/redis_{{ item }}.conf --daemonize yes"
      loop: "{{ redis_ports }}"
      changed_when: false

    - name: Wait for Redis ports to be ready
      wait_for:
        port: "{{ item }}"
        host: 127.0.0.1
        timeout: 10
      loop: "{{ redis_ports }}"

    - name: Check Redis Cluster status
      shell: redis-cli -p 7000 cluster info
      register: redis_cluster_check
      ignore_errors: yes
      changed_when: false

    - name: Reset Redis nodes to clean state
      shell: "redis-cli -p {{ item }} flushall && redis-cli -p {{ item }} cluster reset hard"
      loop: "{{ redis_ports }}"
      changed_when: false
      

    - name: Create Redis Cluster
      shell: >
        redis-cli --cluster create
        {% for p in redis_ports %} 127.0.0.1:{{ p }} {% endfor %}
        --cluster-replicas 1 --cluster-yes
      register: cluster_result
      failed_when: 
        - cluster_result.rc != 0
        - "'already in cluster' not in cluster_result.stderr"
        - "'Node 127.0.0.1:7000 is not empty' not in cluster_result.stderr"
    
    - name: Create log directory for the app
      file:
        path: /var/log/crudwithauth
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Configure logrotate for the app
      template:
        src: templates/logrotate.conf.j2
        dest: /etc/logrotate.d/crudwithauth
        owner: root
        group: root
        mode: '0644'

    - name: Ensure app directory exists
      file: 
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app artifacts to web folder
      copy:
        src: "./out/" 
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        mode: '0644'
    
    - name: Render appsettings.json
      template: 
        src: templates/appsettings.json.j2
        dest: "{{ app_dir }}/appsettings.json"
        owner: "{{ app_user }}"
        mode: '0600'
    
    - name: Deploy systemd unit
      template:
        src: templates/dotnet.service.j2
        dest: /etc/systemd/system/crudwithauth.service
      notify: Restart Application
    
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Deploy Nginx configuration from template
      template:
        src: templates/nginx_app.j2
        dest: /etc/nginx/sites-available/crudwithauth
      notify: Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/crudwithauth
        dest: /etc/nginx/sites-enabled/crudwithauth
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx
  
  handlers:
    - name: Restart Application
      systemd:
        name: crudwithauth
        state: restarted
        enabled: yes
        daemon_reload: yes
    
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded