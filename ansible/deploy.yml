- name: Deploy .Net
  hosts: all
  become: yes

  vars:
    app_dir: "/var/www/crudwithauth"
    app_user: "www-data"
    db_name: "crud_db"
    db_user: "postgres"
    db_password: "postgres_password"
    redis_ports: [7000, 7001, 7002, 7003, 7004, 7005]
    jwt_secret_key: H81NOnU9S+BLv1YMn3KIZ1w1g9MgfDI4D8l6QiJbJsA=
    dotnet_path: "/usr/bin/dotnet"

  tasks:
    - name: Check if .NET is already installed
      command: dotnet --version
      register: dotnet_check
      ignore_errors: yes
      changed_when: false

    - name: Install .NET 9 via Official Script (Reliable Method)
      shell: |
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 9.0 --install-dir /usr/share/dotnet
        ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
      when: dotnet_check.failed
      args:
        creates: /usr/bin/dotnet

    - name: Install System Packages
      apt: 
        name: [postgresql, postgresql-contrib, redis-server, python3-psycopg2, acl, curl]
        state: present
        update_cache: yes
      register: apt_res
      until: apt_res is success
      retries: 5
      delay: 5

    - name: Configure PostgreSQL Database
      become_user: postgres
      block:
        - postgresql_db:
            name: "{{ db_name }}"
        - postgresql_user:
            name: "{{ db_user }}"
            password: "{{ db_password }}"
            db: "{{ db_name }}"  
            priv: "ALL"          

    - name: Ensure Redis directories exist
      file:
        path: "/var/lib/redis/{{ item }}"
        state: directory
        owner: redis
        group: redis
      loop: "{{ redis_ports }}"
      vars:
        port: "{{ item }}"

    - name: Configure Redis Nodes
      template:
        src: templates/redis.conf.j2
        dest: "/etc/redis/redis_{{ item }}.conf"
      loop: "{{ redis_ports }}"
      vars:
        port: "{{ item }}"
    
    - name: Start Redis instances
      shell: "redis-server /etc/redis/redis_{{ item }}.conf --daemonize yes"
      loop: "{{ redis_ports }}"
      changed_when: false

    - name: Wait for Redis ports to be ready
      wait_for:
        port: "{{ item }}"
        host: 127.0.0.1
        timeout: 10
      loop: "{{ redis_ports }}"

    - name: Check Redis Cluster status
      shell: redis-cli -p 7000 cluster info
      register: redis_cluster_check
      ignore_errors: yes
      changed_when: false

    - name: Reset Redis nodes before cluster creation
      shell: "redis-cli -p {{ item }} cluster reset hard"
      loop: "{{ redis_ports }}"
      changed_when: false
      ignore_errors: yes

    - name: Create Redis Cluster
      shell: >
        echo "yes" | redis-cli --cluster create
        {% for p in redis_ports %} 127.0.0.1:{{ p }} {% endfor %}
        --cluster-replicas 1 --cluster-yes
      register: cluster_init
      until: "'OK' in cluster_init.stdout or 'already in cluster' in cluster_init.stderr"
      retries: 3
      delay: 5
      when: "'cluster_state:ok' not in redis_cluster_check.stdout"
      
    - name: Ensure app directory exists
      file: 
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Copy app artifacts to web folder
      copy:
        src: "./out/" 
        dest: "{{ app_dir }}/"
        owner: "{{ app_user }}"
        mode: '0644'
    
    - name: Render appsettings.json
      template: 
        src: templates/appsettings.json.j2
        dest: "{{ app_dir }}/appsettings.json"
        owner: "{{ app_user }}"
        mode: '0600'
    
    - name: Deploy systemd unit
      template:
        src: templates/dotnet.service.j2
        dest: /etc/systemd/system/crudwithauth.service
      notify: Restart Application
    
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Deploy Nginx configuration from template
      template:
        src: templates/nginx_app.j2
        dest: /etc/nginx/sites-available/crudwithauth
      notify: Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/crudwithauth
        dest: /etc/nginx/sites-enabled/crudwithauth
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx
  
  handlers:
    - name: Restart Application
      systemd:
        name: crudwithauth
        state: restarted
        enabled: yes
        daemon_reload: yes
    
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded